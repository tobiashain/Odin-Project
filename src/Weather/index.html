<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="./style.css" rel="stylesheet" />
    <script src="./index.js"></script>
    <title>Document</title>
  </head>
  <body>
    <svg xmlns="http://www.w3.org/2000/svg" style="display: none">
      <!-- Sunny -->
      <symbol id="icon-sunny" viewBox="0 0 64 64">
        <circle cx="32" cy="32" r="12" fill="#FDB813" />
        <g stroke="#FDB813" stroke-width="4" stroke-linecap="round">
          <line x1="32" y1="2" x2="32" y2="14" />
          <line x1="32" y1="50" x2="32" y2="62" />
          <line x1="2" y1="32" x2="14" y2="32" />
          <line x1="50" y1="32" x2="62" y2="32" />
          <line x1="10" y1="10" x2="18" y2="18" />
          <line x1="46" y1="46" x2="54" y2="54" />
          <line x1="10" y1="54" x2="18" y2="46" />
          <line x1="46" y1="18" x2="54" y2="10" />
        </g>
      </symbol>

      <!-- Partly Cloudy -->
      <symbol id="icon-partly-cloudy" viewBox="0 0 64 64">
        <circle cx="22" cy="22" r="10" fill="#FDB813" />
        <path
          d="M20 42h26a8 8 0 0 0 0-16 12 12 0 0 0-23-3A7 7 0 0 0 20 42z"
          fill="#E0E0E0"
        />
      </symbol>

      <!-- Cloudy -->
      <symbol id="icon-cloudy" viewBox="0 0 64 64">
        <path
          d="M16 44h32a10 10 0 0 0 0-20 16 16 0 0 0-31-4A9 9 0 0 0 16 44z"
          fill="#B0BEC5"
        />
      </symbol>

      <!-- Rain -->
      <symbol id="icon-rain" viewBox="0 0 64 64">
        <path
          d="M16 36h32a10 10 0 0 0 0-20 16 16 0 0 0-31-4A9 9 0 0 0 16 36z"
          fill="#B0BEC5"
        />
        <g stroke="#2196F3" stroke-width="4" stroke-linecap="round">
          <line x1="24" y1="40" x2="24" y2="54" />
          <line x1="32" y1="40" x2="32" y2="54" />
          <line x1="40" y1="40" x2="40" y2="54" />
        </g>
      </symbol>

      <!-- Thunderstorm -->
      <symbol id="icon-thunder" viewBox="0 0 64 64">
        <path
          d="M14 34h36a10 10 0 0 0 0-20 16 16 0 0 0-31-4A9 9 0 0 0 14 34z"
          fill="#90A4AE"
        />
        <polygon
          points="30,36 24,52 32,52 28,64 42,44 34,44 38,36"
          fill="#FFD54F"
        />
      </symbol>

      <!-- Snow -->
      <symbol id="icon-snow" viewBox="0 0 64 64">
        <path
          d="M16 34h32a10 10 0 0 0 0-20 16 16 0 0 0-31-4A9 9 0 0 0 16 34z"
          fill="#CFD8DC"
        />
        <g fill="#90CAF9">
          <circle cx="24" cy="44" r="3" />
          <circle cx="32" cy="48" r="3" />
          <circle cx="40" cy="44" r="3" />
        </g>
      </symbol>

      <!-- Fog -->
      <symbol id="icon-fog" viewBox="0 0 64 64">
        <path
          d="M14 30h36a10 10 0 0 0 0-20 16 16 0 0 0-31-4A9 9 0 0 0 14 30z"
          fill="#CFD8DC"
        />
        <g stroke="#B0BEC5" stroke-width="4" stroke-linecap="round">
          <line x1="12" y1="40" x2="52" y2="40" />
          <line x1="16" y1="48" x2="48" y2="48" />
        </g>
      </symbol>

      <!-- Windy -->
      <symbol id="icon-windy" viewBox="0 0 64 64">
        <g stroke="#81D4FA" stroke-width="4" stroke-linecap="round" fill="none">
          <path d="M8 24h32a6 6 0 1 0-6-6" />
          <path d="M8 36h40a6 6 0 1 1-6 6" />
          <path d="M8 48h24" />
        </g>
      </symbol>

      <!-- Clear Night -->
      <symbol id="icon-night" viewBox="0 0 64 64">
        <path d="M40 8a20 20 0 1 0 16 32A18 18 0 1 1 40 8z" fill="#B39DDB" />
        <circle cx="48" cy="20" r="2" fill="#FFF" />
        <circle cx="52" cy="28" r="1.5" fill="#FFF" />
      </symbol>
    </svg>

    <svg width="64" height="64"><use href="#icon-partly-cloudy" /></svg>
  </body>
</html>
