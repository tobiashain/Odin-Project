<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="./styles.css" rel="stylesheet" />
    <script src="./library.js" defer></script>
    <title>Library</title>
  </head>
  <body>
    <div class="addBookContainer">
      <form id="addBookForm" method="dialog">
        <div class="item">
          <label for="title">Title</label>
          <input type="text" name="title" id="title" />
        </div>
        <div class="item">
          <label for="author">Author</label>
          <input type="text" name="author" id="author" />
        </div>
        <div class="item">
          <label for="pages">Pages</label>
          <input type="number" name="pages" id="pages" />
        </div>
        <div class="item">
          <label for="read">Read</label>
          <input type="checkbox" name="read" id="read" />
        </div>
        <div class="item">
          <label for="shelf">Shelf</label>
          <input
            type="number"
            min="1"
            max="3"
            value="1"
            name="shelf"
            id="shelf"
          />
        </div>
        <button id="addBook" type="submit">Add Book</button>
      </form>
    </div>
    <div class="container">
      <div class="bookshelf">
        <div class="innerBookshelf">
          <div class="shelfs">
            <div class="shelf">
              <div class="left"></div>
              <div class="right"></div>
            </div>
            <div class="shelf">
              <div class="left"></div>
              <div class="right"></div>
            </div>
            <div class="shelf">
              <div class="left"></div>
              <div class="right"></div>
            </div>
          </div>
          <div class="shelf">
            <div class="left"></div>
            <div class="right"></div>
          </div>
          <div class="grid">
            <div class="shelf-1 row"></div>
            <div class="shelf-2 row"></div>
            <div class="shelf-3 row"></div>
          </div>
        </div>
      </div>
    </div>

    <dialog id="showBookDialog">
      <div class="item">
        <label for="title">Title:</label>
        <div class="title"></div>
      </div>
      <div class="item">
        <label for="author">Author:</label>
        <div class="author"></div>
      </div>
      <div class="item">
        <div class="pages"></div>
        <label for="pages">pages</label>
      </div>
      <div class="item">
        <input type="radio" name="read" id="read" value="true" />
        <label for="read">Read</label>
        <input type="radio" name="read" id="unread" value="false" />
        <label for="unread">Not Read</label>
      </div>
      <button id="closeDialog">Close</button>
    </dialog>
  </body>
</html>
