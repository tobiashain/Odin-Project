<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="./styles.css" rel="stylesheet" />
    <script src="./todo-list.js" defer></script>
    <title>Todo-List</title>
  </head>
  <body>
    <dialog>
      <form action="" autocomplete="off">
        <div class="item">
          <label for="title">Title</label
          ><input type="text" name="title" id="title" />
        </div>
        <div class="item">
          <label for="description">Description</label
          ><input type="text" name="description" id="description" />
        </div>
        <div class="item">
          <label for="dueDate">Due</label
          ><input type="date" name="dueDate" id="dueDate" />
        </div>
        <div class="item">
          <label for="priority">Priority</label>
          <select name="priority" id="priority">
            <option value="Low">Low</option>
            <option value="Medium">Medium</option>
            <option value="High">High</option>
          </select>
        </div>
        <div class="item">
          <label for="selectTask">Task</label>
          <select name="selectTask" id="selectTask">
            <option value="notes">Notes</option>
            <option value="checklist">Checklist</option>
          </select>
        </div>
        <div class="item" id="taskDiv">
          <input type="text" placeholder="Enter your note" />
        </div>
        <div class="item">
          <button id="submitBtn" type="submit">Submit</button>
          <button id="closeBtn" type="button">Close</button>
        </div>
      </form>
    </dialog>
    <div class="content">
      <aside></aside>
      <main>
        <div class="settings"></div>
        <div class="container">
          <div class="addTodo">
            <div class="plus">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 50 50">
                <line
                  x1="25"
                  y1="10"
                  x2="25"
                  y2="40"
                  stroke="currentColor"
                  stroke-width="2"
                />
                <line
                  x1="10"
                  y1="25"
                  x2="40"
                  y2="25"
                  stroke="currentColor"
                  stroke-width="2"
                />
              </svg>
            </div>
            <div class="text">Create New Todo</div>
          </div>
        </div>
      </main>
    </div>
  </body>
</html>
