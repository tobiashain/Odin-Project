<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="./script.js" defer></script>
    <title>Rock-Paper-Scissors</title>
  </head>
  <body>
    <div>
      <label>Score:</label>
      <label id="score">0</label>
    </div>
    <div>
      <button class="choice" value="rock">Rock</button>
      <button class="choice" value="paper">Paper</button>
      <button class="choice" value="scissors">Scissors</button>
    </div>
    <div>
      <label>Your Pick:</label>
      <label id="you"></label>
    </div>
    <div>
      <label>Dealers Pick:</label>
      <label id="dealer"></label>
    </div>
    <div>
      <label>Outcome:</label>
      <label id="outcome"></label>
    </div>
  </body>
</html>
