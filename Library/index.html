<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="./styles.css" rel="stylesheet" />
    <script type="module" src="/dist/Library/library.js" defer></script>
    <title>Library</title>
  </head>
  <body>
    <button id="newBook">New Book</button>
    <div id="bookshelf"></div>
    <div class="container">
      <div class="bookshelf">
        <div class="innerBookshelf">
          <div class="shelfs">
            <div class="shelf">
              <div class="left"></div>
              <div class="right"></div>
            </div>
            <div class="shelf">
              <div class="left"></div>
              <div class="right"></div>
            </div>
            <div class="shelf">
              <div class="left"></div>
              <div class="right"></div>
            </div>
          </div>
          <div class="shelf">
            <div class="left"></div>
            <div class="right"></div>
          </div>
          <div class="grid">
            <div class="shelf-1 row">
              <div class="book">
                <div class="title">Arthur King</div>
                <div class="left"></div>
                <div class="right"></div>
              </div>
            </div>
            <div class="shelf-2 row"></div>
            <div class="shelf-3 row"></div>
          </div>
        </div>
      </div>
    </div>

    <dialog>
      <form id="addBookForm" method="dialog">
        <label for="title">Title</label>
        <input type="text" name="title" id="title" />
        <label for="author">Author</label>
        <input type="text" name="author" id="author" />
        <label for="pages">Pages</label>
        <input type="number" name="pages" id="pages" />
        <label for="read">Read</label>
        <input type="checkbox" name="read" id="read" />
        <label for="shelf">Shelf</label>
        <input
          type="number"
          min="1"
          max="3"
          value="1"
          name="shelf"
          id="shelf"
        />
        <button id="addBook" type="submit">Add Book</button>
      </form>
    </dialog>
  </body>
</html>
