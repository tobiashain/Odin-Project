<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="./styles/global.css" rel="stylesheet" />
    <link href="./styles/form.css" rel="stylesheet" />
    <link href="./styles/settings.css" rel="stylesheet" />
    <link href="./styles/sidebar.css" rel="stylesheet" />
    <link href="./styles/todos.css" rel="stylesheet" />
    <script src="./index.js" defer></script>
    <title>Todo-List</title>
  </head>
  <body>
    <dialog>
      <form action="" autocomplete="off">
        <div class="item">
          <label for="title">Title</label
          ><input type="text" name="title" id="title" />
        </div>
        <div class="item">
          <label for="description">Description</label
          ><input type="text" name="description" id="description" />
        </div>
        <div class="item">
          <label for="dueDate">Due</label
          ><input type="date" name="dueDate" id="dueDate" />
        </div>
        <div class="item">
          <label for="priority">Priority</label>
          <select name="priority" id="priority">
            <option value="Low">Low</option>
            <option value="Medium">Medium</option>
            <option value="High">High</option>
          </select>
        </div>
        <div class="item">
          <label for="selectTask">Task</label>
          <select name="selectTask" id="selectTask">
            <option value="notes">Notes</option>
            <option value="checklist">Checklist</option>
          </select>
        </div>
        <div class="item" id="taskDiv"></div>
        <div id="listContainer"></div>
        <div class="item">
          <button id="submitBtn" type="submit">Submit</button>
          <button id="closeBtn" type="button">Close</button>
        </div>
      </form>
    </dialog>
    <div class="content">
      <aside>
        <div class="top">
          <img class="logo" src="./public/odin-lined.png" alt="" />
          <button id="addProject">Add New Project</button>
        </div>
        <div id="projectList"></div>
      </aside>
      <main>
        <div class="settings">
          <div id="settingsTitle"></div>
          <div id="settingsOptions">
            <label>Task</label>
            <label>Date</label>
            <label>Priority</label>
            <label>State</label>
            <select name="filterTask" id="filterTask">
              <option value="All">All</option>
              <option value="note">Note</option>
              <option value="checklist">Checklist</option>
            </select>
            <input name="filterDate" id="filterDate" type="date" />
            <select name="filterPriority" id="filterPriority">
              <option value="All">All</option>
              <option value="Low">Low</option>
              <option value="Medium">Medium</option>
              <option value="High">High</option>
            </select>
            <select name="filterState" id="filterState">
              <option value="All">All</option>
              <option value="Not Started">Not Started</option>
              <option value="Pending">Pending</option>
              <option value="Done">Done</option>
            </select>
          </div>
        </div>
        <div id="todosContainer">
          <div id="addTodo">
            <div class="plus">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 50 50">
                <line
                  x1="25"
                  y1="10"
                  x2="25"
                  y2="40"
                  stroke="currentColor"
                  stroke-width="2"
                />
                <line
                  x1="10"
                  y1="25"
                  x2="40"
                  y2="25"
                  stroke="currentColor"
                  stroke-width="2"
                />
              </svg>
            </div>
            <div class="text">Create New Todo</div>
          </div>
          <div id="selectProject">No project is currently selected!</div>
        </div>
      </main>
    </div>
  </body>
</html>
